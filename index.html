<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shining Typing Sparkler</title>
    <style>
        body { margin: 0; background-color: #000; overflow: hidden; font-family: 'Inter', sans-serif; cursor: crosshair; }
        canvas { display: block; }
        #ui {
            position: absolute; top: 30px; left: 30px; color: #fff; z-index: 10; pointer-events: none;
        }
        #ui h1 { margin: 0; font-size: 16px; font-weight: 300; letter-spacing: 0.5em; text-transform: uppercase; color: rgba(255,255,255,0.6); }
        #display-text {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            color: #fff; font-size: clamp(30px, 8vw, 80px); font-weight: 800; letter-spacing: 0.1em;
            pointer-events: none; text-shadow: 0 0 30px rgba(255,255,255,0.4); text-align: center; width: 90%;
        }
    </style>
</head>
<body>
    <div id="ui"><h1>Shining Typing Sparkler</h1></div>
    <div id="display-text"></div>

    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
    </script>

    <script type="module">
        import * as THREE from 'three';

        let scene, camera, renderer;
        const sparks = [];
        const prismColors = [0xffffff, 0x00ffff, 0xff00ff, 0xffff00, 0x00ff00, 0xff3300];
        const display = document.getElementById('display-text');

        init();
        animate();

        function init() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.z = 30;

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            document.body.appendChild(renderer.domElement);

            window.addEventListener('keydown', (e) => {
                if (e.key.length === 1) {
                    display.innerText += e.key;
                    createBurst();
                } else if (e.key === 'Backspace') {
                    display.innerText = display.innerText.slice(0, -1);
                    createBurst();
                } else if (e.key === 'Enter') {
                    display.innerText = "";
                    createBigBurst();
                }
                if(display.innerText.length > 20) display.innerText = display.innerText.slice(1);
            });

            window.addEventListener('resize', onWindowResize);
        }

        class Spark {
            constructor(x, y, color) {
                const geo = new THREE.SphereGeometry(Math.random() * 0.12, 6, 6);
                const mat = new THREE.MeshBasicMaterial({ color: color, transparent: true, blending: THREE.AdditiveBlending });
                this.mesh = new THREE.Mesh(geo, mat);
                this.mesh.position.set(x, y, 0);
                scene.add(this.mesh);

                const angle = Math.random() * Math.PI * 2;
                const force = Math.random() * 0.6 + 0.2;
                this.vel = new THREE.Vector3(Math.cos(angle) * force, Math.sin(angle) * force, (Math.random()-0.5)*0.5);
                this.gravity = -0.012;
                this.life = 1.0;
                this.decay = Math.random() * 0.02 + 0.01;
            }
            update() {
                this.vel.y += this.gravity;
                this.mesh.position.add(this.vel);
                this.life -= this.decay;
                this.mesh.scale.set(this.life, this.life, this.life);
                this.mesh.material.opacity = this.life;
                return this.life > 0;
            }
            destroy() {
                scene.remove(this.mesh);
                this.mesh.geometry.dispose();
                this.mesh.material.dispose();
            }
        }

        function createBurst() {
            const x = (Math.random() - 0.5) * 20;
            const y = (Math.random() - 0.5) * 10;
            const col = prismColors[Math.floor(Math.random() * prismColors.length)];
            for (let i = 0; i < 15; i++) sparks.push(new Spark(x, y, col));
        }

        function createBigBurst() {
            const col = 0xffffff;
            for (let i = 0; i < 50; i++) sparks.push(new Spark(0, 0, col));
        }

        function animate() {
            requestAnimationFrame(animate);
            for (let i = sparks.length - 1; i >= 0; i--) {
                if (!sparks[i].update()) {
                    sparks[i].destroy();
                    sparks.splice(i, 1);
                }
            }
            renderer.render(scene, camera);
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }
    </script>
</body>
</html>
